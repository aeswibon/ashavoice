services:
  backend:
    build:
      context: ../backend
      dockerfile: ./docker/dev.Dockerfile
    volumes:
      - ../backend:/app
      - ../data:/data
      - ../models:/models
      - ollama_data:/root/.ollama
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      WHISPER_MODEL_DIR: /models/whisper_cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pipenv run python -c "import os; assert os.path.exists(''/app/pipeline.py'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        # reservations:
        #   cpus: '1.0'
        #   memory: 2G

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
